<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Bharatiya Bhasha Parivaar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/theme.css">
</head>
<body class="bg-[#FFFBF0] text-[#2C1200] font-sans">

<div id="navbar-placeholder"></div>

<div class="w-full">

  <!-- Header -->
  <div class="saffron-header text-white py-20">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center relative z-10">
      <h1 class="text-4xl md:text-5xl font-bold mb-6 hero-in">Contact Us</h1>
      <p class="text-xl text-[#FFEDD5] max-w-3xl mx-auto hero-in-2">Have questions about our programs or admissions? We're here to help.</p>
    </div>
  </div>

  <section class="py-20 bg-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">

        <!-- Contact Info -->
        <div class="anim-left">
          <h2 class="text-3xl font-bold text-[#2C1200] mb-8">Get in Touch</h2>
          <div class="space-y-8">
            <div class="flex items-start gap-4">
              <div class="w-12 h-12 bg-[#FFF7ED] text-[#C2410C] rounded-full flex items-center justify-center shrink-0">
                <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13.5 19.79 19.79 0 0 1 1.61 4.88 2 2 0 0 1 3.59 2.68h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 10a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              </div>
              <div>
                <h3 class="text-lg font-bold text-[#2C1200] mb-1">Phone</h3>
                <p class="text-stone-600 mb-1">Mon-Fri from 9am to 6pm PST</p>
                <a href="tel:+18582295820" class="text-[#C2410C] font-medium hover:underline">+1 (858)-229-5820</a>
              </div>
            </div>
            <div class="flex items-start gap-4">
              <div class="w-12 h-12 bg-[#FFF7ED] text-[#C2410C] rounded-full flex items-center justify-center shrink-0">
                <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              </div>
              <div>
                <h3 class="text-lg font-bold text-[#2C1200] mb-1">Email</h3>
                <p class="text-stone-600 mb-1">Our friendly team is here to help.</p>
                <a href="mailto:admin@bhashaparivar.org" class="text-[#C2410C] font-medium hover:underline">admin@bhashaparivar.org</a>
              </div>
            </div>
            <div class="flex items-start gap-4">
              <div class="w-12 h-12 bg-[#FFF7ED] text-[#C2410C] rounded-full flex items-center justify-center shrink-0">
                <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
              </div>
              <div>
                <h3 class="text-lg font-bold text-[#2C1200] mb-1">Office</h3>
                <p class="text-stone-600 mb-1">Come say hello at our California office.</p>
                <p class="text-[#2C1200] font-medium">California, USA</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Contact Form (UI only — no backend submission) — commented out in original -->

      </div>
    </div>
  </section>

</div>

<div id="footer-placeholder"></div>

<script src="js/components.js"></script>
<script>
  renderNavbar('');
  renderFooter('');
  initScrollAnimations();
</script>
</body>
</html>
